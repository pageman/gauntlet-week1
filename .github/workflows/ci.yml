name: Week 1 CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sprint1-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Sprint 1 dependencies
        working-directory: sprint1-api
        run: python -m pip install -r requirements.txt
      - name: Run Sprint 1 tests
        working-directory: sprint1-api
        run: python -m pytest tests -q

  sprint2-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Sprint 2 package and test dependencies
        working-directory: sprint2-cli
        run: python -m pip install -e ".[dev]"
      - name: Run Sprint 2 tests
        working-directory: sprint2-cli
        run: python -m pytest tests -q
